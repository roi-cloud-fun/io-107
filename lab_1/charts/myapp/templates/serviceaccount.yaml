{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
  annotations:
    # IRSA: this annotation is what EKS reads to bind this ServiceAccount to
    # an IAM role via the cluster's OIDC provider. The IAM role's trust policy
    # must scope assumption to system:serviceaccount:<namespace>:<sa-name>.
    eks.amazonaws.com/role-arn: {{ index .Values.serviceAccount.annotations "eks.amazonaws.com/role-arn" | quote }}
{{- end }}
