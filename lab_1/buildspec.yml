version: 0.2

env:
  variables:
    CLUSTER_NAME: "training-eks-cluster"
    NAMESPACE: "lab1"
    APP_NAME: "myapp"

phases:
  install:
    commands:
      # Helm install (training shortcut — production pipelines should use a pre-baked image with Helm pinned).
      - curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - aws eks update-kubeconfig --name $CLUSTER_NAME --region us-east-1

  pre_build:
    commands:
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
      - COMMIT_SHA=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG="${COMMIT_SHA}"

  build:
    commands:
      - docker build -t $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG .
      - docker push $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG

  post_build:
    commands:
      # IRSA role ARN is selected by $ENVIRONMENT. Both ARNs are passed in
      # from CodeBuild env vars (set by lab_env_student/) so the chart values
      # never have to hardcode an AWS account ID.
      - |
        case "$ENVIRONMENT" in
          dev) IRSA_ROLE_ARN="$IRSA_ROLE_ARN_DEV" ;;
          stg) IRSA_ROLE_ARN="$IRSA_ROLE_ARN_STG" ;;
          *)   echo "Unknown ENVIRONMENT: $ENVIRONMENT"; exit 1 ;;
        esac
      # Self-heal stuck Helm releases. If a previous build was killed mid-
      # operation (CodeBuild timeout, Docker Hub 429, AWS API blip, etc.),
      # Helm leaves the release in `pending-install` / `pending-upgrade` /
      # `pending-rollback` state and refuses to start a new operation with
      # "another operation (install/upgrade/rollback) is in progress".
      # Detect that and recover before running `helm upgrade --install`.
      - |
        STATUS=$(helm status "$APP_NAME" -n "$NAMESPACE" -o json 2>/dev/null | \
                   python3 -c "import json,sys; print(json.load(sys.stdin).get('info',{}).get('status',''))" 2>/dev/null || echo "")
        case "$STATUS" in
          pending-install)
            echo "Recovering stuck release: pending-install -> uninstall (never finished, nothing to keep)"
            helm uninstall "$APP_NAME" -n "$NAMESPACE" --ignore-not-found || true
            ;;
          pending-upgrade|pending-rollback)
            echo "Recovering stuck release: $STATUS -> rollback to previous good revision"
            helm rollback "$APP_NAME" -n "$NAMESPACE" || true
            ;;
          *)
            echo "Release status: ${STATUS:-not-installed} -- no recovery needed"
            ;;
        esac
      - |
        helm upgrade --install $APP_NAME charts/myapp \
          --namespace $NAMESPACE \
          --create-namespace \
          --values charts/myapp/values-$ENVIRONMENT.yaml \
          --set image.repository=$ECR_REGISTRY/$APP_NAME \
          --set image.tag=$IMAGE_TAG \
          --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$IRSA_ROLE_ARN" \
          --atomic \
          --timeout 10m
      - kubectl rollout status deployment/$APP_NAME -n $NAMESPACE --timeout=5m
      - kubectl get pods -n $NAMESPACE -l app=$APP_NAME
