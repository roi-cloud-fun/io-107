version: 0.2

# AWS CodeBuild spec for the Validate stage of the IO-107 Lab 3 pipeline.
#
# Stages:
#   install     -> install Terraform and Conftest binaries
#   pre_build   -> terraform init
#   build       -> terraform plan, convert to JSON, run Conftest against the
#                  plan AND against the Kubernetes manifest directory
#   post_build  -> (intentionally empty; Validate stage fails by design on the
#                   broken state and is replaced by the Deploy stage's
#                   buildspec on the next stage of the pipeline)

env:
  variables:
    TERRAFORM_VERSION: "1.6.6"
    CONFTEST_VERSION: "0.46.0"
    AWS_REGION: "us-east-1"

phases:
  install:
    commands:
      - echo "Installing Terraform ${TERRAFORM_VERSION}"
      - curl -sLo terraform.zip "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
      - unzip -o terraform.zip -d /usr/local/bin/
      - terraform version

      - echo "Installing Conftest ${CONFTEST_VERSION}"
      - curl -sLo conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
      - tar -xzf conftest.tar.gz -C /usr/local/bin conftest
      - conftest --version

  pre_build:
    commands:
      - echo "Initializing Terraform"
      - cd terraform
      - terraform init -backend=false -input=false
      - cd ..

  build:
    commands:
      - echo "Generating Terraform plan"
      - cd terraform
      - terraform plan -input=false -out=tfplan
      - terraform show -json tfplan > ../tfplan.json
      - cd ..

      - echo "Running Conftest against Terraform plan"
      - conftest test tfplan.json

      - echo "Running Conftest against Kubernetes manifests"
      - conftest test kubernetes/

  post_build:
    commands:
      - echo "Validate stage complete. If Conftest returned non-zero, the pipeline halts here by design."

artifacts:
  files:
    - tfplan.json
    - terraform/tfplan
  discard-paths: no
