###############################################################################
# IO-107 Lab 3 -- buildspec.yml
#
# This ONE buildspec is invoked from THREE separate CodePipeline stages
# (Build, Validate, Deploy). The pipeline overrides `LAB_PHASE` per stage:
#
#   Source   -> CodeCommit pulls the repo (no buildspec)
#   Build    -> LAB_PHASE=plan      install + terraform init + plan -> tfplan(.json)
#   Validate -> LAB_PHASE=validate  conftest test against the plan + K8s manifests
#   Deploy   -> LAB_PHASE=deploy    terraform apply (re-plans) + kubectl apply
#
# Why Deploy re-plans instead of consuming Build's tfplan binary:
#   Passing the binary tfplan between pipeline stages via the build_output
#   artifact is fragile in CodePipeline -- the S3 artifact zip/unzip can drop
#   or relocate the file depending on artifact config. The Validate stage
#   only needs tfplan.json (text), which travels reliably. Deploy re-runs
#   `terraform init && terraform apply` against the per-student S3 backend,
#   which is idempotent given a clean policy gate upstream. (Lab 4 has a
#   manual approval gate and DOES need to apply the exact approved plan --
#   it solves this differently.)
###############################################################################

version: 0.2

env:
  variables:
    LAB_PHASE: "plan"          # overridden per-stage by the pipeline
    TERRAFORM_VERSION: "1.6.6"
    CONFTEST_VERSION: "0.46.0"
    # AWS_REGION is provided automatically by CodeBuild (= this project's region,
    # i.e. the region you deployed to). Do NOT hardcode it, or non-us-east-1
    # deploys break.
    # EKS_CLUSTER_NAME and ARTIFACT_BUCKET are set on the CodeBuild project
    # by lab_env_student/ so the Deploy phase can run `kubectl apply` against
    # the per-student cluster and `terraform init` can configure the S3
    # backend.

phases:
  install:
    commands:
      - echo "LAB_PHASE = ${LAB_PHASE}"
      - echo "Installing Terraform ${TERRAFORM_VERSION}"
      - curl -sLo terraform.zip "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
      - unzip -o terraform.zip -d /usr/local/bin/
      - terraform version
      - echo "Installing Conftest ${CONFTEST_VERSION}"
      - curl -sLo conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
      - tar -xzf conftest.tar.gz -C /usr/local/bin conftest
      - conftest --version
      # Deploy phase needs kubectl for K8s apply.
      - |
        if [ "$LAB_PHASE" = "deploy" ]; then
          echo "Installing kubectl"
          curl -sLo /usr/local/bin/kubectl https://amazon-eks.s3.us-west-2.amazonaws.com/1.29.0/2024-01-04/bin/linux/amd64/kubectl
          chmod +x /usr/local/bin/kubectl
          kubectl version --client
        fi

  build:
    commands:
      - |
        # set -e MUST be inside this heredoc -- each entry in `commands:` is
        # a separate shell invocation, so `set -e` declared as its own
        # command does not carry into subsequent commands.
        set -e
        case "$LAB_PHASE" in
          plan)
            echo "===== Build / Plan phase ====="
            cd terraform
            terraform init -input=false \
              -backend-config="bucket=${ARTIFACT_BUCKET}" \
              -backend-config="region=${AWS_REGION}"
            terraform plan -input=false -no-color -out=tfplan
            terraform show -json tfplan > ../tfplan.json
            cd ..
            echo "Plan artifact written to tfplan.json"
            ;;
          validate)
            echo "===== Validate / OPA phase ====="
            echo "Running Conftest against Terraform plan"
            conftest test tfplan.json
            echo
            echo "Running Conftest against Kubernetes manifests"
            conftest test kubernetes/
            ;;
          deploy)
            echo "===== Deploy phase ====="
            echo "Re-initializing Terraform and applying against per-student S3 backend"
            cd terraform
            terraform init -input=false \
              -backend-config="bucket=${ARTIFACT_BUCKET}" \
              -backend-config="region=${AWS_REGION}"
            terraform apply -input=false -auto-approve
            cd ..
            echo
            if [ -n "${EKS_CLUSTER_NAME}" ]; then
              echo "Applying Kubernetes manifest"
              aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"
              # Create the lab3 namespace (idempotent).
              kubectl create namespace lab3 --dry-run=client -o yaml | kubectl apply -f -
              # `-n lab3` sets the deployment's namespace at apply time. The
              # fixture's deployment.yaml does NOT hardcode a namespace, so
              # this flag is the single source of truth for namespace
              # placement and matches the rollout-status check below.
              kubectl apply -f kubernetes/deployment.yaml -n lab3
              kubectl rollout status deployment/myapp -n lab3 --timeout=3m
            else
              echo "EKS_CLUSTER_NAME not set; skipping kubectl apply"
            fi
            ;;
          *)
            echo "Unknown LAB_PHASE: $LAB_PHASE -- expected plan / validate / deploy"
            exit 1
            ;;
        esac

# The output artifact must include the full working tree so downstream
# stages (Validate, Deploy) can re-run the buildspec with a different
# LAB_PHASE. Validate reads tfplan.json from this artifact.
artifacts:
  files:
    - '**/*'
  discard-paths: no
