{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
  annotations:
    # IRSA: EKS reads this annotation to bind the ServiceAccount to an IAM role
    # via the cluster's OIDC provider. The role (created in lab_5/terraform)
    # trusts only system:serviceaccount:<lab5-namespace>:myapp-sa and grants
    # secretsmanager:GetSecretValue on the Aurora master-user secret.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
{{- end }}
