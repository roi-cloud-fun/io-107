apiVersion: v1
kind: Service
metadata:
  name: {{ include "myapp.name" . }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort | default .Values.containerPort }}
      protocol: TCP
      name: http
  # The cutover knob: traffic goes to whichever color activeColor names.
  # `helm upgrade --set activeColor=green` flips this selector blue -> green
  # with zero downtime (and back to blue for an instant rollback).
  selector:
    app: {{ include "myapp.name" . }}
    color: {{ .Values.activeColor }}
