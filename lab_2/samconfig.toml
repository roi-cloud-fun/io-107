# SAM CLI configuration file.
# Used by `sam build` / `sam deploy` so students don't have to pass the same flags every time.
# Reference: https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

[default.global.parameters]
stack_name = "io107-lab2-sam-app"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
stack_name = "io107-lab2-sam-app"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
# resolve_s3 NOT set here: the buildspec passes `--s3-bucket $ARTIFACT_BUCKET`
# explicitly (the per-student artifact bucket Terraform created in
# lab_env_student/). Having `resolve_s3 = true` here causes
#   Error: Cannot use both --resolve-s3 and --s3-bucket parameters.
parameter_overrides = "Environment=\"dev\" LogLevel=\"INFO\""

[default.package.parameters]
# Same reason as above -- buildspec passes --s3-bucket explicitly.

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"
